<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ title }}</title>
  <style>
    :root {
      --bg: #f5f6f8;
      --fg: #1c2024;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-fg: #fff;
      --border: #d1d5db;
      --field-bg: #fff;
      --group-bg: #fafbfc;
      --raw: #9ca3af;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font: 14px/1.4 -apple-system, "Segoe UI", system-ui, sans-serif;
      color: var(--fg); background: var(--bg);
    }
    .container { display: flex; height: 100vh; }
    .form-pane {
      flex: 0 0 50%; overflow-y: auto; padding: 24px 28px;
      border-right: 1px solid var(--border); background: var(--bg);
    }
    .preview-pane {
      flex: 1 1 auto; background: #2a2e33; position: sticky; top: 0;
      display: flex; flex-direction: column;
    }
    .preview-pane iframe {
      flex: 1 1 auto; width: 100%; border: 0; background: #fff;
    }
    .topbar { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
    .topbar a.back { color: var(--muted); text-decoration: none; font-size: 13px; }
    .topbar a.back:hover { color: var(--fg); }
    h1 { margin: 0; font-size: 20px; }
    h1 + .sub { color: var(--muted); margin: 4px 0 0; }
    section.page {
      background: var(--field-bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 14px 18px 18px; margin-bottom: 16px;
    }
    section.page > h2 {
      margin: 0 0 12px; font-size: 15px;
      color: var(--accent); text-transform: uppercase; letter-spacing: 0.04em;
    }
    .fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 18px; }
    .field { display: flex; flex-direction: column; }
    .field-text, .field-radio { grid-column: span 1; }
    .field-radio, .field-group, .field-check-all { grid-column: 1 / -1; }
    .label { font-weight: 500; font-size: 12.5px; margin-bottom: 3px; }
    .raw { color: var(--raw); font-weight: 400; font-size: 11px; margin-left: 6px; }
    .req { color: #b91c1c; font-weight: 600; margin-left: 3px; }
    input[type="text"], input[type="date"], input[type="email"], input[type="tel"], input[type="number"] {
      width: 100%; padding: 6px 8px; font: inherit;
      border: 1px solid var(--border); border-radius: 4px;
      background: var(--field-bg);
    }
    input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
    fieldset {
      border: 1px solid var(--border); border-radius: 4px;
      padding: 6px 10px 8px; margin: 0; background: var(--group-bg);
    }
    fieldset legend { padding: 0 4px; }
    fieldset .radios {
      display: flex; flex-wrap: wrap; gap: 6px 14px; margin-top: 2px;
    }
    fieldset label.radio {
      display: inline-flex; align-items: center; gap: 4px; cursor: pointer;
    }
    .actions {
      display: flex; gap: 8px; padding: 12px 0 24px;
      position: sticky; bottom: 0; background: var(--bg);
      border-top: 1px solid var(--border);
    }
    button {
      font: inherit; padding: 8px 14px; border-radius: 4px; cursor: pointer;
      border: 1px solid var(--accent); background: var(--accent);
      color: var(--accent-fg);
    }
    button.secondary { background: var(--field-bg); color: var(--fg); border-color: var(--border); }
    button.ghost { background: transparent; color: var(--fg); border-color: var(--border); }
    button:hover { filter: brightness(0.95); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .status { color: var(--muted); font-size: 12px; margin-left: 6px; align-self: center; }
    .err { color: #b91c1c; }
    pre#extract-output {
      background: #1c2024; color: #d4d4d4; padding: 12px;
      border-radius: 6px; font-size: 12px; max-height: 360px; overflow: auto;
    }
    /* group (repeater) */
    .repeater-item {
      background: var(--field-bg); border: 1px solid var(--border);
      border-radius: 6px; padding: 10px 12px; margin-bottom: 8px;
      display: grid; grid-template-columns: 1fr 1fr auto;
      gap: 8px 12px; align-items: end;
    }
    .repeater-item h4 {
      grid-column: 1 / -1; margin: 0 0 2px; font-size: 12px;
      color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em;
    }
    .repeater-controls { display: flex; gap: 6px; margin-top: 4px; }
    .check-all-row {
      display: flex; gap: 8px; align-items: center;
      padding: 6px 0;
    }
    .check-all-row input[type="checkbox"] { transform: scale(1.2); }
  </style>
</head>
<body>
  <div class="container">
    <main class="form-pane">
      <div class="topbar">
        <a class="back" href="/">&larr; Forms</a>
      </div>
      <h1 id="form-title">{{ title }}</h1>
      <div class="sub" id="form-meta">loading…</div>

      <form id="app-form" autocomplete="off"></form>

      <div class="actions">
        <button type="button" id="btn-fill">Generate filled PDF</button>
        <button type="button" id="btn-extract" class="secondary">Extract</button>
        <button type="reset" form="app-form" class="ghost">Reset</button>
        <span class="status" id="status"></span>
      </div>

      <h2 style="font-size:14px; margin: 8px 0 6px;">Extract output</h2>
      <pre id="extract-output" hidden></pre>
    </main>

    <aside class="preview-pane">
      <iframe id="pdf-preview" title="Filled PDF"></iframe>
    </aside>
  </div>

  <script>
    // ---------------------------------------------------------------- data
    const formId = {{ form_id | tojson }};
    const apiBase = `/forms/${formId}`;
    const form = document.getElementById("app-form");
    const meta = document.getElementById("form-meta");
    const titleEl = document.getElementById("form-title");
    const iframe = document.getElementById("pdf-preview");
    const output = document.getElementById("extract-output");
    const status = document.getElementById("status");
    const btnFill = document.getElementById("btn-fill");
    const btnExtract = document.getElementById("btn-extract");

    function setStatus(msg, isErr) {
      status.textContent = msg || "";
      status.className = "status" + (isErr ? " err" : "");
    }

    // ---------------------------------------------------------------- builders
    function esc(s) {
      return String(s == null ? "" : s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
    }

    function fieldHtmlByName(schema, appName) {
      return schema.fields.find(f => f.app === appName);
    }

    function inputTypeFor(format) {
      return { date: "date", email: "email", tel: "tel", number: "number" }[format] || "text";
    }

    function buildTextInput(f) {
      const itype = inputTypeFor(f.format);
      const req = f.required ? ' <span class="req" title="required">*</span>' : "";
      return `
        <div class="field field-text">
          <label>
            <span class="label">${esc(f.label)}<span class="raw">(${esc(f.app)})</span>${req}</span>
            <input type="${itype}" name="${esc(f.app)}" ${f.required ? "required" : ""}>
          </label>
        </div>`;
    }

    function buildRadioInput(f) {
      const opts = (f.options || []).map(o =>
        `<label class="radio">
           <input type="radio" name="${esc(f.app)}" value="${esc(o.value)}">
           ${esc(o.label)}
         </label>`).join("");
      const req = f.required ? ' <span class="req" title="required">*</span>' : "";
      return `
        <div class="field field-radio">
          <fieldset>
            <legend>
              <span class="label">${esc(f.label)}<span class="raw">(${esc(f.app)})</span>${req}</span>
            </legend>
            <div class="radios">${opts}</div>
          </fieldset>
        </div>`;
    }

    function buildGroupInput(f) {
      // Repeater: a list of items, each with the sub-fields from f.item.
      // We'll render a container with one default empty item, plus an
      // "Add another" button. Each item is data-indexed so we can read
      // the values back.
      const subInputs = f.item.map(sub => {
        const itype = inputTypeFor(sub.format);
        const req = sub.required ? ' <span class="req" title="required">*</span>' : "";
        return `
          <label>
            <span class="label">${esc(sub.label)}<span class="raw">(${esc(sub.app)})</span>${req}</span>
            <input type="${itype}" data-sub="${esc(sub.app)}" ${sub.required ? "required" : ""}>
          </label>`;
      }).join("");
      return `
        <div class="field field-group" data-app="${esc(f.app)}" data-max="${f.max_items}">
          <fieldset>
            <legend>
              <span class="label">${esc(f.label)}<span class="raw">(${esc(f.app)})</span></span>
            </legend>
            <div class="repeater-list"></div>
            <div class="repeater-controls">
              <button type="button" class="secondary btn-add">+ Add another</button>
              <span class="status" data-count></span>
            </div>
            <!-- templates -->
            <template data-template>
              <div class="repeater-item">
                <h4 data-heading></h4>
                ${subInputs}
                <button type="button" class="ghost btn-remove">Remove</button>
              </div>
            </template>
          </fieldset>
        </div>`;
    }

    function buildCheckAllInput(f) {
      return `
        <div class="field field-check-all">
          <fieldset>
            <legend>
              <span class="label">${esc(f.label)}<span class="raw">(${esc(f.app)}, ${f.count || "?"} boxes)</span></span>
            </legend>
            <div class="check-all-row">
              <input type="checkbox" name="${esc(f.app)}" value="on">
              <span>Tick all ${f.count || ""} boxes</span>
            </div>
          </fieldset>
        </div>`;
    }

    // ---------------------------------------------------------------- repeater logic
    function setupGroup(widget) {
      const app = widget.getAttribute("data-app");
      const max = parseInt(widget.getAttribute("data-max") || "1", 10);
      const tpl = widget.querySelector("template[data-template]");
      const list = widget.querySelector(".repeater-list");
      const btnAdd = widget.querySelector(".btn-add");
      const count = widget.querySelector("[data-count]");

      function update() {
        const items = list.querySelectorAll(".repeater-item");
        items.forEach((it, i) => {
          it.setAttribute("data-idx", String(i));
          const h = it.querySelector("[data-heading]");
          if (h) h.textContent = `#${i + 1}`;
        });
        count.textContent = `${items.length} / ${max}`;
        btnAdd.disabled = items.length >= max;
      }

      function addItem(prefill) {
        const items = list.querySelectorAll(".repeater-item");
        if (items.length >= max) return;
        const node = tpl.content.firstElementChild.cloneNode(true);
        list.appendChild(node);
        if (prefill) {
          for (const [k, v] of Object.entries(prefill)) {
            const input = node.querySelector(`[data-sub="${k}"]`);
            if (input) input.value = v == null ? "" : v;
          }
        }
        // wire remove
        node.querySelector(".btn-remove").addEventListener("click", () => {
          node.remove();
          update();
        });
        update();
      }

      btnAdd.addEventListener("click", () => addItem());
      addItem();   // start with one empty row
    }

    // ---------------------------------------------------------------- collect
    function collectForm(schema) {
      const out = {};
      const groups = form.querySelectorAll("[data-app]");
      for (const g of groups) {
        const app = g.getAttribute("data-app");
        const items = [];
        for (const it of g.querySelectorAll(".repeater-item")) {
          const obj = {};
          for (const input of it.querySelectorAll("[data-sub]")) {
            const k = input.getAttribute("data-sub");
            obj[k] = input.value;
          }
          items.push(obj);
        }
        out[app] = items;
      }
      // flat text/radio/check_all
      const flat = new FormData(form);
      for (const [k, v] of flat.entries()) {
        if (!(k in out)) out[k] = v;
      }
      // for checkboxes that the FormData skipped because they're not
      // checked, we need to send a "false" so the engine knows to untick.
      for (const f of schema.fields) {
        if (f.type === "check_all" && !(f.app in out)) {
          out[f.app] = false;
        }
      }
      return out;
    }

    // ---------------------------------------------------------------- load
    let currentSchema = null;
    async function load() {
      try {
        const res = await fetch(`${apiBase}/schema.json`);
        if (!res.ok) {
          meta.textContent = `error: ${res.status}`;
          return;
        }
        currentSchema = await res.json();
        titleEl.textContent = currentSchema.title;
        meta.textContent = `${currentSchema.pages} pages · ${currentSchema.fields.length} fields`;
        renderForm(currentSchema);
        btnFill.disabled = false;
      } catch (e) {
        meta.textContent = `load error: ${e}`;
      }
    }

    function renderForm(schema) {
      form.innerHTML = "";
      // Build sections if any, else flat list.
      const sections = (schema.sections && schema.sections.length)
        ? schema.sections
        : [{ title: "", fields: schema.fields.map(f => f.app) }];
      for (const sec of sections) {
        const wrap = document.createElement("section");
        wrap.className = "page";
        if (sec.title) {
          const h = document.createElement("h2");
          h.textContent = sec.title;
          wrap.appendChild(h);
        }
        const grid = document.createElement("div");
        grid.className = "fields";
        for (const appName of sec.fields) {
          const f = fieldHtmlByName(schema, appName);
          if (!f) continue;
          if (f.type === "text")       grid.insertAdjacentHTML("beforeend", buildTextInput(f));
          else if (f.type === "radio") grid.insertAdjacentHTML("beforeend", buildRadioInput(f));
          else if (f.type === "group") grid.insertAdjacentHTML("beforeend", buildGroupInput(f));
          else if (f.type === "check_all") grid.insertAdjacentHTML("beforeend", buildCheckAllInput(f));
        }
        wrap.appendChild(grid);
        form.appendChild(wrap);
      }
      // wire up groups
      for (const g of form.querySelectorAll("[data-app]")) setupGroup(g);
    }

    let lastBlobUrl = null;
    let lastCacheKey = null;

    // ---------------------------------------------------------------- actions
    btnFill.addEventListener("click", async () => {
      btnFill.disabled = true;
      setStatus("Filling…");
      try {
        const res = await fetch(`${apiBase}/fill`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(collectForm(currentSchema)),
        });
        // 200 → PDF bytes; 4xx → JSON {error, errors: [...]}
        const ct = res.headers.get("Content-Type") || "";
        if (!res.ok || !ct.includes("application/pdf")) {
          let msg = `Fill failed (${res.status})`;
          try {
            const data = await res.json();
            if (data.errors && data.errors.length) {
              msg = data.errors
                .map(e => `${e.field}: ${e.message}`)
                .join("; ");
            } else if (data.error) {
              msg = data.error;
            }
          } catch (_) { /* not JSON, fall through */ }
          setStatus(msg, true);
          return;
        }
        // Success: blob the PDF, swap into the iframe.
        if (lastBlobUrl) URL.revokeObjectURL(lastBlobUrl);
        const blob = await res.blob();
        lastBlobUrl = URL.createObjectURL(blob);
        lastCacheKey = res.headers.get("X-Cache-Key") || null;
        iframe.src = lastBlobUrl;
        const tag = res.headers.get("X-Cache") === "hit" ? " (cache hit)" : "";
        setStatus("Filled" + tag + ".");
      } catch (e) {
        setStatus("Fill error: " + e, true);
      } finally {
        btnFill.disabled = false;
      }
    });

    btnExtract.addEventListener("click", async () => {
      btnExtract.disabled = true;
      setStatus("Reading…");
      try {
        // Use the last cache key if we have one, else the legacy path.
        const url = lastCacheKey
          ? `${apiBase}/extract?key=${encodeURIComponent(lastCacheKey)}`
          : `${apiBase}/extract`;
        const res = await fetch(url);
        const data = await res.json();
        output.textContent = JSON.stringify(data, null, 2);
        output.hidden = false;
        setStatus("Done.");
      } catch (e) {
        setStatus("Extract error: " + e, true);
      } finally {
        btnExtract.disabled = false;
      }
    });

    form.addEventListener("reset", () => {
      output.hidden = true;
      output.textContent = "";
      setStatus("");
    });

    load();
  </script>
</body>
</html>
