# Form 956 — Appointment of a migration agent (Australian immigration).
# Source PDF: pdfs/956.pdf
# Drafted from `python -m pdfform inspect pdfs/956.pdf`; labels filled in
# by hand to match the printed form.

id: form956
title: "Form 956 — Appointment of a registered migration agent"
pdf: pdfs/956.pdf
pages: 6

# App-side field names (left) -> PDF widget names (right). The app's
# HTML form will use the `app` names; the engine writes to the `pdf`
# widgets. This indirection means the app stays decoupled from the
# PDF's internal naming.

fields:

  # ============================================================
  # Page 3 — Migration agent details
  # ============================================================

  - app: agent_title
    pdf: "mg.title"
    type: radio
    label: "Title"
    options: { mr: "Mr", mrs: "Mrs", miss: "Miss", ms: "Ms" }

  - app: agent_title_other
    pdf: "mg.title other"
    type: text
    label: "Other title"

  - app: is_new_application
    pdf: "mg.app"
    type: radio
    label: "Is this a new application?"
    options: { "Yes": "Yes", "No": "No" }

  - app: preferred_communication
    pdf: "mg.comm"
    type: radio
    label: "Do you prefer written communication?"
    options: { "Yes": "Yes", "No": "No" }

  - app: assistance_type
    pdf: "mg.prov assist"
    type: radio
    label: "Type of assistance provided"
    options:
      Legal: "Legal practitioner"
      reg: "Registered migration agent"
      exampt: "Exempt from registration"

  - app: another_migration_agent
    pdf: "mg.oth mig"
    type: radio
    label: "Another registered migration agent providing assistance?"
    options: { "Yes": "Yes", "No": "No" }

  - app: exemption_reason
    pdf: "mg.reason ex"
    type: radio
    label: "Reason exempt from registration"
    options:
      close: "Close family member"
      sponsor: "Sponsor"
      nominator: "Nominator"
      diplom: "Diplomatic / consular staff"
      parlia: "Parliamentarian"
      public: "Public sector official"

  - app: agent_family_name
    pdf: "mg.name fam"
    type: text
    label: "Family name"
    required: true

  - app: agent_given_names
    pdf: "mg.name giv"
    type: text
    label: "Given names"

  - app: agent_dob
    pdf: "mg.dob"
    type: text
    label: "Date of birth (dd/mm/yyyy)"
    format: date

  - app: agent_org_name
    pdf: "mg.org name"
    type: text
    label: "Organisation / trading name"

  - app: agent_resadd_str
    pdf: "mg.resadd str"
    type: text
    label: "Residential address — street"

  - app: agent_resadd_sub
    pdf: "mg.resadd sub"
    type: text
    label: "Residential address — suburb/state"

  - app: agent_resadd_cntry
    pdf: "mg.resadd cntry"
    type: text
    label: "Residential address — country"

  - app: agent_resadd_pc
    pdf: "mg.resadd pc"
    type: text
    label: "Residential address — postcode"

  - app: agent_postal_str
    pdf: "mg.postal str"
    type: text
    label: "Postal address — street"

  - app: agent_postal_sub
    pdf: "mg.postal sub"
    type: text
    label: "Postal address — suburb/state"

  - app: agent_postal_cntry
    pdf: "mg.postal cntry"
    type: text
    label: "Postal address — country"

  - app: agent_postal_pc
    pdf: "mg.postal pc"
    type: text
    label: "Postal address — postcode"

  - app: agent_off_ph_cc
    pdf: "mg.off ph cc"
    type: text
    label: "Office phone — country code"

  - app: agent_off_ph_ac
    pdf: "mg.off ph ac"
    type: text
    label: "Office phone — area code"

  - app: agent_off_ph
    pdf: "mg.off ph"
    type: text
    label: "Office phone — number"
    format: tel

  - app: agent_mob
    pdf: "mg.mob"
    type: text
    label: "Mobile"
    format: tel

  - app: agent_email
    pdf: "mg.email"
    type: text
    label: "Email"
    format: email

  - app: agent_marn
    pdf: "mg.marn"
    type: text
    label: "MARN (Migration Agent Registration Number)"

  - app: agent_lpn
    pdf: "mg.lpn"
    type: text
    label: "Legal practitioner number"

  # ============================================================
  # Page 4 — Person being represented & type of assistance
  # ============================================================

  - app: client_role
    pdf: "cc.person rec"
    type: radio
    label: "Person being represented"
    options:
      visa: "Visa applicant"
      sponsor: "Sponsor"
      nom: "Nominator"
      proposer: "Proposer"
      holder: "Visa holder"
      person: "Person"

  - app: assistance_category
    pdf: "ta.assist"
    type: radio
    label: "Type of assistance"
    options:
      Application: "New application"
      Cancellation: "Cancellation / revocation"
      Specific: "Specific matter"

  - app: not_yet_decided
    pdf: "ta.not yet"
    type: radio
    label: "Not yet decided (IAAAS)"

  - app: also_assisting_another
    pdf: "ar.also"
    type: radio
    label: "Also assisting another person?"
    options: { "Yes": "Yes", "No": "No" }

  # The 'cc.name fam', 'cc.name fam 2..6', 'cc.name giv', 'cc.name giv 2..6'
  # widgets are all "person rows" on the form. The bare widget is the
  # primary client; suffixed widgets are additional people. The app
  # provides a list of dicts; the engine writes index 0 to the bare
  # widgets, indices 1..N to the suffixed widgets.
  - app: people
    type: group
    label: "Person(s) on this form"
    pdf_base: "cc.name"
    max_items: 6
    item:
      - app: family
        pdf: "cc.name fam"
        type: text
        label: "Family name"
        required: true
      - app: given
        pdf: "cc.name giv"
        type: text
        label: "Given names"

  - app: client_dob
    pdf: "cc.dob"
    type: text
    label: "Primary client — date of birth (dd/mm/yyyy)"
    format: date

  - app: client_org_name
    pdf: "cc.org name"
    type: text
    label: "Client — organisation / trading name"

  - app: client_resadd_str
    pdf: "cc.resadd str"
    type: text
    label: "Client — residential street"

  - app: client_resadd_sub
    pdf: "cc.resadd sub"
    type: text
    label: "Client — residential suburb/state"

  - app: client_resadd_cntry
    pdf: "cc.resadd cntry"
    type: text
    label: "Client — residential country"

  - app: client_resadd_pc
    pdf: "cc.resadd pc"
    type: text
    label: "Client — residential postcode"

  - app: client_off_ph_cc
    pdf: "cc.off ph cc"
    type: text
    label: "Client — office phone country code"

  - app: client_off_ph_ac
    pdf: "cc.off ph ac"
    type: text
    label: "Client — office phone area code"

  - app: client_off_ph
    pdf: "cc.off ph"
    type: text
    label: "Client — office phone number"
    format: tel

  - app: client_mob
    pdf: "cc.mob"
    type: text
    label: "Client — mobile"
    format: tel

  - app: client_diac_id
    pdf: "cc.diac id"
    type: text
    label: "Client — DIAC / client ID"

  - app: application_type
    pdf: "ta.type"
    type: text
    label: "Application type"

  - app: date_lodged
    pdf: "ta.lodged"
    type: text
    label: "Date lodged (dd/mm/yyyy)"
    format: date

  # Q15 (cancellation branch) — subclass + date granted of the visa
  # being considered for cancellation. Distinct widgets from
  # application_type/date_lodged, which are printed only under the
  # "Application process" branch.
  - app: cancellation_subclass
    pdf: "ta.typecancel"
    type: text
    label: "Subclass of visa (cancellation)"

  - app: cancellation_date_granted
    pdf: "ta.lodgedcancel"
    type: text
    label: "Date visa granted (cancellation, dd/mm/yyyy)"
    format: date

  # Q15 (specific matter branch)
  - app: specific_matter_details
    pdf: "ta.specific matter"
    type: text
    label: "Specific matter details"

  # Q16 — provide at least one of RID / TRN. Distinct widgets from
  # cc.diac id (the Client ID number field near the client's contact
  # details, printed separately on the form).
  - app: client_rid
    pdf: "ta.diac request id"
    type: text
    label: "Request ID number (RID)"

  - app: client_trn
    pdf: "ta.diac trans id"
    type: text
    label: "Transaction Reference Number (TRN)"

  # ============================================================
  # Page 5 — Ending appointment
  # ============================================================

  # Q18 — details of the registered migration agent/legal practitioner/
  # exempt person whose appointment is ending. Distinct widgets from the
  # Part A agent fields above (mg.name fam etc.) — this section describes
  # whoever is named on Part B, who may differ from the Part A agent.
  - app: end_agent_family_name
    pdf: "mg.mig name fam"
    type: text
    label: "Family name (Part B agent)"

  - app: end_agent_given_names
    pdf: "mg.mig name giv"
    type: text
    label: "Given names (Part B agent)"

  - app: end_agent_org_name
    pdf: "mg.mig agent name org"
    type: text
    label: "Organisation name (Part B agent)"

  - app: end_agent_off_ph_cc
    pdf: "mg.mig office std"
    type: text
    label: "Part B agent — office phone country code"

  - app: end_agent_off_ph_ac
    pdf: "mg.mig office sn"
    type: text
    label: "Part B agent — office phone area code"

  - app: end_agent_off_ph
    pdf: "mg.mig office pn"
    type: text
    label: "Part B agent — office phone number"
    format: tel

  - app: end_agent_mob
    pdf: "mg.mig mobile pn"
    type: text
    label: "Part B agent — mobile"
    format: tel

  - app: end_agent_marn
    pdf: "mg.end mig marn num"
    type: text
    label: "Part B agent — MARN"

  - app: end_agent_lpn
    pdf: "mg.end mig lpn num"
    type: text
    label: "Part B agent — legal practitioner number"

  # Q19 — was the Q18 person also the client's authorised recipient, and
  # is the client ending that authorised-recipient appointment.
  - app: also_assisting_in_ending
    pdf: "mg.also ar"
    type: radio
    label: "Was the person named at Question 18 also appointed as the client's authorised recipient?"
    options: { "Yes": "Yes", "No": "No" }

  - app: ending_this_appointment
    pdf: "mg.ending ar"
    type: radio
    label: "Is the client ending their appointment as authorised recipient?"
    options: { "Yes": "Yes", "No": "No" }

  # Q20 — client's details (for the ending appointment).
  - app: end_client_family_name
    pdf: "mg.client name fam"
    type: text
    label: "Client family name (Part B)"

  - app: end_client_given_names
    pdf: "mg.client name giv"
    type: text
    label: "Client given names (Part B)"

  - app: end_client_dob
    pdf: "mg.client dob"
    type: text
    label: "Client date of birth (Part B, dd/mm/yyyy)"
    format: date

  - app: end_client_org_name
    pdf: "mg.client org name"
    type: text
    label: "Client organisation name (Part B)"

  - app: end_client_resadd_str
    pdf: "mg.end resadd str"
    type: text
    label: "Client address — street (Part B)"

  - app: end_client_resadd_sub
    pdf: "mg.end resadd sub"
    type: text
    label: "Client address — suburb/state (Part B)"

  - app: end_client_resadd_cntry
    pdf: "mg.end resadd cntry"
    type: text
    label: "Client address — country (Part B)"

  - app: end_client_resadd_pc
    pdf: "mg.end resadd pc"
    type: text
    label: "Client address — postcode (Part B)"

  - app: end_client_off_ph_cc
    pdf: "mg.end off ph cc"
    type: text
    label: "Client office phone — country code (Part B)"

  - app: end_client_off_ph_ac
    pdf: "mg.end off ph ac"
    type: text
    label: "Client office phone — area code (Part B)"

  - app: end_client_off_ph
    pdf: "mg.end off ph"
    type: text
    label: "Client office phone — number (Part B)"
    format: tel

  - app: end_client_mob
    pdf: "mg.end mob"
    type: text
    label: "Client mobile (Part B)"
    format: tel

  # Q22 — provide at least one of RID/TRN for the Part B ending appointment.
  # Distinct widgets from Q16's client_rid/client_trn ("ta.diac request id"/
  # "ta.diac trans id") and from cc.diac id — this section describes
  # whoever is named in Part B, who may differ from the Part A client.
  - app: end_client_rid
    pdf: "mg.client diac request id"
    type: text
    label: "Request ID number (RID) (Part B)"

  - app: end_client_trn
    pdf: "mg.client diac trans id"
    type: text
    label: "Transaction Reference Number (TRN) (Part B)"

  # Q21 — does the client agree to electronic communication, and their
  # email address.
  - app: communicated_ending
    pdf: "mg.end comm"
    type: radio
    label: "Does the client agree to the Department communicating with them by email or other electronic means?"
    options: { "Yes": "Yes", "No": "No" }

  - app: end_client_email
    pdf: "mg.end email"
    type: text
    label: "Client email address (Part B)"
    format: email

  # ============================================================
  # Page 6 — Declarations
  # ============================================================

  # Agent declarations (Q23) — 4 independent ticks, one widget each.
  # Each is ticked only when its own app value is truthy; unlike the old
  # check_all field, ticking one does not tick the others.
  - app: agent_decl_appointment
    pdf: "mg.dec 1"
    type: radio
    label: "Agent declaration — appointment of agent"

  - app: agent_decl_authorised_recipient
    pdf: "mg.dec 2"
    type: radio
    label: "Agent declaration — appointment as authorised recipient"

  - app: agent_decl_ending_appointment
    pdf: "mg.dec 3"
    type: radio
    label: "Agent declaration — ending appointment"

  - app: agent_decl_withdrawal_recipient
    pdf: "mg.dec 4"
    type: radio
    label: "Agent declaration — withdrawal of authorised recipient"

  # Client declarations (Q24) — 4 independent ticks, one widget each.
  - app: client_decl_appointment
    pdf: "cc.dec 1"
    type: radio
    label: "Client declaration — appointment of agent"

  - app: client_decl_authorised_recipient
    pdf: "cc.dec 2"
    type: radio
    label: "Client declaration — appointment of authorised recipient"

  - app: client_decl_ending_appointment
    pdf: "cc.dec 3"
    type: radio
    label: "Client declaration — ending appointment"

  - app: client_decl_withdrawal_recipient
    pdf: "cc.dec 4"
    type: radio
    label: "Client declaration — withdrawal of authorised recipient"

  - app: agent_declaration_date
    pdf: "mg.dec date"
    type: text
    label: "Migration agent — date (dd/mm/yyyy)"
    format: date

  - app: client_declaration_date
    pdf: "cc.dec date"
    type: text
    label: "Client — date (dd/mm/yyyy)"
    format: date

# Visual grouping in the UI. Every field name listed here must exist
# in `fields:` above. The dynamic form renderer uses these to draw
# <section> blocks; if you omit this, the renderer just lists every
# field in declaration order.
sections:
  - title: "Migration agent"
    fields:
      - agent_title
      - agent_title_other
      - agent_family_name
      - agent_given_names
      - agent_dob
      - agent_org_name
      - agent_resadd_str
      - agent_resadd_sub
      - agent_resadd_cntry
      - agent_resadd_pc
      - agent_postal_str
      - agent_postal_sub
      - agent_postal_cntry
      - agent_postal_pc
      - agent_off_ph_cc
      - agent_off_ph_ac
      - agent_off_ph
      - agent_mob
      - agent_email
      - agent_marn
      - agent_lpn
      - is_new_application
      - preferred_communication
      - assistance_type
      - another_migration_agent
      - exemption_reason

  - title: "Client"
    fields:
      - client_role
      - assistance_category
      - not_yet_decided
      - also_assisting_another
      - people
      - client_dob
      - client_org_name
      - client_resadd_str
      - client_resadd_sub
      - client_resadd_cntry
      - client_resadd_pc
      - client_off_ph_cc
      - client_off_ph_ac
      - client_off_ph
      - client_mob
      - client_diac_id
      - application_type
      - date_lodged
      - cancellation_subclass
      - cancellation_date_granted
      - specific_matter_details
      - client_rid
      - client_trn

  - title: "Ending the appointment"
    fields:
      - end_agent_family_name
      - end_agent_given_names
      - end_agent_org_name
      - end_agent_off_ph_cc
      - end_agent_off_ph_ac
      - end_agent_off_ph
      - end_agent_mob
      - end_agent_marn
      - end_agent_lpn
      - also_assisting_in_ending
      - ending_this_appointment
      - end_client_family_name
      - end_client_given_names
      - end_client_dob
      - end_client_org_name
      - end_client_resadd_str
      - end_client_resadd_sub
      - end_client_resadd_cntry
      - end_client_resadd_pc
      - end_client_off_ph_cc
      - end_client_off_ph_ac
      - end_client_off_ph
      - end_client_mob
      - end_client_rid
      - end_client_trn
      - communicated_ending
      - end_client_email

  - title: "Declarations"
    fields:
      - agent_decl_appointment
      - agent_decl_authorised_recipient
      - agent_decl_ending_appointment
      - agent_decl_withdrawal_recipient
      - agent_declaration_date
      - client_decl_appointment
      - client_decl_authorised_recipient
      - client_decl_ending_appointment
      - client_decl_withdrawal_recipient
      - client_declaration_date
